name: ETF 每日持股追蹤（00981A / 00991A）

on:
  schedule:
    # GitHub 排程為「盡力而為」，整點（如 0 12）在尖峰常被延遲數小時甚至丟棄。
    # 故改為台灣傍晚分散多個非整點時段，搭配去重邏輯（同一資料日只推一次），
    # 任一次先抓到新資料即推送，後續各次自動靜默，不會重複洗版。
    - cron: "57 8 * * 1-5"    # 台灣 16:57
    - cron: "12 9 * * 1-5"   # 台灣 17:12
    - cron: "37 9 * * 1-5"   # 台灣 17:37
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-holdings
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 提前升 Node.js 24，避免 6/16 強制切換造成中斷
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Fetch 00981A holdings, store & notify
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
        run: python scripts/main.py

      - name: Fetch 00991A holdings, store & notify
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL_991A }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
        run: python scripts/main_991a.py

      - name: Commit updated data
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data docs/history.json docs/history_991a.json)" ]; then
            git add data docs/history.json docs/history_991a.json
            git commit -m "data: 更新持股 $(date -u +%Y-%m-%d)"
            git push
          else
            echo "無資料變動，略過 commit。"
          fi
